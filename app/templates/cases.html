{% extends "base.html" %}
{% block title %}Case 列表 - 标注平台{% endblock %}
{% block content %}
<div class="filters">
    <input type="text" id="search-keyword" class="search-input" placeholder="搜索关键词..." title="搜索描述、来源、输出内容等">
    <select id="filter-status">
        <option value="">全部状态</option>
        <option value="pending">待标注</option>
        <option value="annotated">已标注</option>
    </select>
    <select id="filter-category">
        <option value="">全部来源</option>
    </select>
    <select id="filter-score">
        <option value="">全部分数</option>
        <option value="0">0</option>
        <option value="0.33">0.33</option>
        <option value="0.67">0.67</option>
        <option value="1">1.00</option>
        <option value="1.33">1.33</option>
        <option value="1.67">1.67</option>
        <option value="2">2.00</option>
    </select>
    <button type="button" class="time-btn" data-range="custom">自定义时间</button>
    <button type="button" class="btn-multi-select" id="btn-multi-select">多选</button>
    <span class="export-wrapper">
        <button type="button" class="btn-batch-action btn-export" id="btn-export" disabled title="先多选要导出的数据">数据导出</button>
        <div class="export-dropdown" id="export-dropdown">
            <button type="button" class="export-option" data-format="csv">导出 CSV</button>
            <button type="button" class="export-option" data-format="json">导出 JSON</button>
        </div>
    </span>
    <button type="button" class="btn-batch-action btn-batch-delete" id="btn-batch-delete" disabled title="先多选要删除的数据">删除</button>
    <button type="button" class="time-btn-refresh" id="btn-refresh" title="刷新" style="margin-left: auto;">刷新</button>
</div>

<div class="time-custom-range" id="time-custom-range">
    <input type="date" id="filter-start" class="date-input">
    <span class="date-sep">—</span>
    <input type="date" id="filter-end" class="date-input">
    <button type="button" class="btn-shortcut" id="btn-today" data-range="today">今天</button>
    <button type="button" class="btn-shortcut" id="btn-7days" data-range="7days">近7天</button>
    <button type="button" class="btn-shortcut" id="btn-30days" data-range="30days">近30天</button>
    <button type="button" class="btn-confirm" id="btn-confirm-date">确认</button>
    <button type="button" class="btn-cancel" id="btn-cancel-date">取消</button>
</div>

<div class="table-wrapper">
<div class="case-list-header">
<h2 class="case-list-title">Case 列表</h2>
    <div class="per-page-select">
        <select id="per-page" onchange="changePerPage(this.value)">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>
        <span>/ 页</span>
    </div>
</div>
<div class="table-scroll-area">

<!-- 删除确认模态框 -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal-dialog">
        <div class="modal-icon">!</div>
        <h3 class="modal-title">确定删除此 Case?</h3>
        <p class="modal-message">删除后数据不可恢复</p>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="modal-cancel">取消</button>
            <button class="modal-btn modal-btn-confirm" id="modal-confirm">确定</button>
        </div>
    </div>
</div>

<!-- 添加 Case 模态框 -->

<table class="data-table">
    <thead>
        <tr>
<th class="th-checkbox" style="width:4%;display:none"><input type="checkbox" id="select-all" style="display:none"></th>
            <th style="width:6%">Case ID</th>
            <th style="width:12%">来源</th>
            <th style="width:7%">分类</th>
            <th style="width:10%">描述</th>
            <th style="width:8%">详细分析</th>
            <th style="width:8%">创建时间</th>
            <th style="width:5%">状态</th>
            <th style="width:5%">准确度</th>
            <th style="width:6%">可操作性</th>
            <th style="width:5%">可读性</th>
            <th style="width:6%">整体分数</th>
            <th style="width:10%">问题根因</th>
            <th style="width:10%">备注</th>
<th style="width:8%">操作</th>
        </tr>
    </thead>
    <tbody id="case-list"></tbody>
</table>
</div>
<div class="pagination-info" id="pagination">
    <span class="record-info" id="record-info"></span>
    <div class="pagination-nav" id="pagination-nav"></div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/v1';

// HTML 转义，防止 XSS
function esc(str) {
    if (str == null) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
}

// 时间筛选逻辑 - 仅自定义模式
let currentRange = '';

function setActiveTimeBtn(range) {
    document.querySelectorAll('.time-btn[data-range]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.range === range);
    });
}

document.querySelectorAll('.time-btn[data-range]').forEach(btn => {
    btn.addEventListener('click', function() {
        const range = this.dataset.range;
        if (range === 'custom') {
            const customRange = document.getElementById('time-custom-range');
            // 切换面板显示/隐藏
            if (customRange.style.display === 'none' || !customRange.style.display) {
                customRange.style.display = 'flex';
                currentRange = 'custom';
                setActiveTimeBtn('custom');
            } else {
                customRange.style.display = 'none';
                currentRange = '';
                setActiveTimeBtn('');
            }
        }
    });
});

document.getElementById('btn-confirm-date').addEventListener('click', function() {
    currentRange = 'custom';
    setActiveTimeBtn('custom');
    loadCases(1);
});

// 快捷时间按钮
function setShortcutDate(days) {
    const end = new Date();
    const start = new Date();
    if (days === 0) {
        start.setHours(0, 0, 0, 0);
    } else {
        start.setDate(start.getDate() - days);
    }
    // date input 只接受 YYYY-MM-DD 格式，使用本地时间避免时区偏移
    const fmtDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById('filter-start').value = fmtDate(start);
    document.getElementById('filter-end').value = fmtDate(end);
    currentRange = 'custom';
    setActiveTimeBtn('custom');
    document.querySelectorAll('.btn-shortcut').forEach(btn => btn.classList.remove('active'));
    const key = days === 0 ? 'btn-today' : days === 6 ? 'btn-7days' : 'btn-30days';
    document.getElementById(key).classList.add('active');
    // 收起自定义时间面板
    document.getElementById('time-custom-range').style.display = 'flex';
    loadCases(1);
}

document.getElementById('btn-today').addEventListener('click', function() { setShortcutDate(0); });
document.getElementById('btn-7days').addEventListener('click', function() { setShortcutDate(6); });
document.getElementById('btn-30days').addEventListener('click', function() { setShortcutDate(29); });

document.getElementById('btn-cancel-date').addEventListener('click', function() {
    document.getElementById('time-custom-range').style.display = 'none';
    document.getElementById('filter-start').value = '';
    document.getElementById('filter-end').value = '';
    document.querySelectorAll('.btn-shortcut').forEach(btn => btn.classList.remove('active'));
    currentRange = '';
    setActiveTimeBtn('');
    loadCases(1);
});

document.getElementById('btn-refresh').addEventListener('click', function() {
    window.location.reload();
});

// 批量操作按钮逻辑
const exportBtn = document.getElementById('btn-export');
const exportDropdown = document.getElementById('export-dropdown');
const batchDeleteBtn = document.getElementById('btn-batch-delete');

// 导出按钮点击：切换下拉菜单
exportBtn.addEventListener('click', function(e) {
    if (this.disabled) return;
    e.stopPropagation();
    exportDropdown.style.display = exportDropdown.style.display === 'block' ? 'none' : 'block';
});

// 点击其他区域关闭下拉菜单
document.addEventListener('click', function() {
    exportDropdown.style.display = 'none';
});

// 选择导出格式 — 异步导出
document.querySelectorAll('.export-option').forEach(opt => {
    opt.addEventListener('click', function() {
        const selectedIds = [...document.querySelectorAll('.row-checkbox:checked')].map(cb => cb.dataset.id);
        if (selectedIds.length === 0) return;
        const fmt = this.dataset.format;
        const params = new URLSearchParams({format: fmt});
        params.set('ids', selectedIds.join(','));
        exportBtn.disabled = true;
        exportBtn.textContent = '导出中...';
        exportDropdown.style.display = 'none';

        fetch(API + '/export?' + params)
            .then(r => { if (r.status !== 202) throw new Error('提交失败'); return r.json(); })
            .then(data => pollExport(data.task_id, fmt, selectedIds.length))
            .catch(() => {
                alert('导出失败');
                exportBtn.disabled = false;
                exportBtn.textContent = '数据导出';
            });
    });
});

function pollExport(taskId, fmt, count) {
    const poll = () => {
        fetch(API + '/export/status/' + taskId)
            .then(r => r.json())
            .then(data => {
                if (data.status === 'done') {
                    // 下载文件
                    const a = document.createElement('a');
                    a.href = API + '/export/download/' + taskId;
                    a.download = `export.${fmt}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    exportBtn.disabled = false;
                    exportBtn.textContent = '数据导出';
                } else if (data.status === 'failed') {
                    alert('导出失败: ' + (data.error || '未知错误'));
                    exportBtn.disabled = false;
                    exportBtn.textContent = '数据导出';
                } else {
                    // processing，继续轮询
                    setTimeout(poll, 500);
                }
            })
            .catch(() => {
                alert('查询导出状态失败');
                exportBtn.disabled = false;
                exportBtn.textContent = '数据导出';
            });
    };
    poll();
}

// 批量删除选中的数据
batchDeleteBtn.addEventListener('click', function() {
    if (this.disabled) return;
    const selectedIds = [...document.querySelectorAll('.row-checkbox:checked')].map(cb => cb.dataset.id);
    if (selectedIds.length === 0) return;
    deleteTargetId = '__batch__';
    document.querySelector('#delete-modal .modal-title').textContent = `确定删除选中的 ${selectedIds.length} 条 Case?`;
    document.getElementById('delete-modal').classList.add('active');
});

let currentPage = 1;
let currentPageSize = 25;

let deleteTargetId = null;

function deleteCase(caseId) {
    deleteTargetId = caseId;
    document.getElementById('delete-modal').classList.add('active');
}

function closeDeleteModal() {
    document.getElementById('delete-modal').classList.remove('active');
    document.querySelector('#delete-modal .modal-title').textContent = '确定删除此 Case?';
    deleteTargetId = null;
}

function confirmDelete() {
    if (!deleteTargetId) return;
    if (deleteTargetId === '__batch__') {
        // 批量删除
        const selectedIds = [...document.querySelectorAll('.row-checkbox:checked')].map(cb => cb.dataset.id);
        closeDeleteModal();
        Promise.all(selectedIds.map(id => fetch(API + '/cases/' + id, { method: 'DELETE' })))
            .then(results => {
                const failed = results.filter(r => !r.ok).length;
                if (failed > 0) {
                    alert(`${failed} 条删除失败`);
                }
                document.getElementById('select-all').checked = false;
                loadCases(currentPage);
            })
            .catch(() => alert('网络错误'));
    } else {
        // 单条删除
        const caseId = deleteTargetId;
        closeDeleteModal();
        fetch(API + '/cases/' + caseId, { method: 'DELETE' })
            .then(r => {
                if (r.ok) {
                    loadCases(currentPage);
                } else {
                    r.json().then(data => alert(data.error || '删除失败')).catch(() => alert('删除失败'));
                }
            })
            .catch(() => alert('网络错误'));
    }
}

document.getElementById('modal-cancel').addEventListener('click', closeDeleteModal);
document.getElementById('modal-confirm').addEventListener('click', confirmDelete);
document.getElementById('delete-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteModal();
});

// 多选按钮逻辑
const multiSelectBtn = document.getElementById('btn-multi-select');
let isMultiSelectMode = false;

function updateMultiSelectCount() {
    const count = document.querySelectorAll('.row-checkbox:checked').length;
    multiSelectBtn.textContent = count > 0 ? `多选(${count})` : '多选';
    // 有选中数据时启用批量操作按钮，否则禁用
    const hasSelected = count > 0;
    exportBtn.disabled = !hasSelected;
    exportBtn.title = hasSelected ? '导出选中的数据' : '先多选选中要导出的数据';
    batchDeleteBtn.disabled = !hasSelected;
    batchDeleteBtn.title = hasSelected ? '删除选中的数据' : '先多选选中要删除的数据';
}

multiSelectBtn.addEventListener('click', function() {
    isMultiSelectMode = !isMultiSelectMode;
    multiSelectBtn.classList.toggle('active', isMultiSelectMode);

    const selectAll = document.getElementById('select-all');
    const rowCheckboxes = document.querySelectorAll('.row-checkbox');

    if (isMultiSelectMode) {
        // 显示选择框列
        selectAll.style.display = '';
        document.querySelector('.th-checkbox').style.display = '';
        document.querySelectorAll('.td-checkbox').forEach(td => td.style.display = '');
        rowCheckboxes.forEach(cb => cb.style.display = '');
        multiSelectBtn.textContent = '多选(0)';
    } else {
        // 隐藏选择框列，取消全选
        selectAll.checked = false;
        selectAll.style.display = 'none';
        document.querySelector('.th-checkbox').style.display = 'none';
        document.querySelectorAll('.td-checkbox').forEach(td => td.style.display = 'none');
        rowCheckboxes.forEach(cb => { cb.checked = false; cb.style.display = 'none'; });
        multiSelectBtn.textContent = '多选';
        updateMultiSelectCount();
    }
});

// 全选/取消全选
document.getElementById('select-all').addEventListener('change', function() {
    const checked = this.checked;
    document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
    updateMultiSelectCount();
});

// 监听行checkbox变化
document.getElementById('case-list').addEventListener('change', function(e) {
    if (e.target.classList.contains('row-checkbox')) {
        // 如果有任何一个取消勾选，则全选也取消
        if (!e.target.checked) {
            document.getElementById('select-all').checked = false;
        } else {
            // 检查是否所有行都被选中
            const allCheckboxes = document.querySelectorAll('.row-checkbox');
            const allChecked = [...allCheckboxes].every(cb => cb.checked);
            document.getElementById('select-all').checked = allChecked;
        }
        updateMultiSelectCount();
    }
});

function loadSources() {
    fetch(API + '/cases?page_size=1000')
        .then(r => r.json())
        .then(data => {
            const sources = [...new Set(data.cases.map(c => c.source).filter(Boolean))];
            const sel = document.getElementById('filter-category');
            sel.innerHTML = '<option value="">全部来源</option>';
            sources.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s.length > 8 ? s.substring(0, 8) + '…' : s;
                opt.title = s;
                sel.appendChild(opt);
            });
        });
}

function loadCases(page) {
    currentPage = page;
    const params = new URLSearchParams({page, page_size: currentPageSize});
    const status = document.getElementById('filter-status').value;
    const category = document.getElementById('filter-category').value;
    const score = document.getElementById('filter-score').value;
    const keyword = document.getElementById('search-keyword').value.trim();
    const start = document.getElementById('filter-start').value;
    const end = document.getElementById('filter-end').value;
    if (status) params.set('status', status);
    if (category) params.set('source', category);
    if (score) params.set('score', score);
    if (keyword) params.set('keyword', keyword);
    if (start) params.set('start_date', start.includes('T') ? start : start + 'T00:00:00');
    if (end) params.set('end_date', end.includes('T') ? end : end + 'T23:59:59');

    fetch(API + '/cases?' + params)
        .then(r => r.json())
        .then(data => {
            const tbody = document.getElementById('case-list');
            tbody.innerHTML = data.cases.map(c => {
                const scoreLabel = (s) => s === 2 ? '<span class="score-tag score-excellent">优秀</span>' : s === 1 ? '<span class="score-tag score-pass">合格</span>' : s === 0 ? '<span class="score-tag score-fail">不合格</span>' : '-';
                const formatOverall = (s) => {
                    if (s == null) return '-';
                    if (Number.isInteger(s)) return s.toString();
                    return parseFloat(s.toFixed(2)).toString();
                };
                return `
                <tr>
                    <td class="td-checkbox"><input type="checkbox" class="row-checkbox" data-id="${esc(c.case_id)}" style="display:none"></td>
                    <td><a href="/annotate/${esc(c.case_id)}" class="case-id-link">${esc(c.case_id)}</a></td>
<td class="truncate" title="${esc(c.source)}">${esc(c.source) || '-'}</td>
<td class="truncate" title="${esc(c.category)}">${esc(c.category) || '-'}</td>
                    <td class="truncate" title="${esc(c.description)}">${esc(c.description) || '-'}</td>
                    <td>${c.has_detail ? `<a href="/annotate/${esc(c.case_id)}" class="case-id-link">查看分析</a>` : '-'}</td>
                    <td>${c.created_at ? new Date(c.created_at).toLocaleString('zh-CN') : '-'}</td>
                    <td><span class="badge badge-${esc(c.status)}">${c.status === 'pending' ? '待标注' : '已标注'}</span></td>
                    <td>${scoreLabel(c.accuracy_score)}</td>
                    <td>${scoreLabel(c.operability_score)}</td>
                    <td>${scoreLabel(c.readability_score)}</td>
                    <td>${formatOverall(c.overall_score)}</td>
                    <td class="truncate" title="${esc(c.root_cause)}">${esc(c.root_cause) || '-'}</td>
                    <td class="truncate" title="${esc(c.remark)}">${esc(c.remark) || '-'}</td>
                    <td class="action-cell"><div class="action-btns"><a href="/annotate/${esc(c.case_id)}" class="btn btn-sm ${c.status === 'pending' ? 'btn-annotate' : 'btn-view'}">${c.status === 'pending' ? '去标注' : '查看'}</a><button class="btn btn-sm btn-delete" onclick="deleteCase('${esc(c.case_id)}')">删除</button></div></td>
                </tr>
                `;
            }).join('');

            // 根据多选模式状态设置checkbox的可见性
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            const selectAll = document.getElementById('select-all');
            if (isMultiSelectMode) {
                selectAll.style.display = '';
                document.querySelector('.th-checkbox').style.display = '';
                document.querySelectorAll('.td-checkbox').forEach(td => td.style.display = '');
                rowCheckboxes.forEach(cb => cb.style.display = '');
            } else {
                selectAll.style.display = 'none';
                document.querySelector('.th-checkbox').style.display = 'none';
                document.querySelectorAll('.td-checkbox').forEach(td => td.style.display = 'none');
                rowCheckboxes.forEach(cb => { cb.style.display = 'none'; cb.checked = false; });
                selectAll.checked = false;
            }

            // 多选模式下更新选中数量
            updateMultiSelectCount();

            renderPagination(data, page);
        });
}

function renderPagination(data, current) {
    const total = Math.ceil(data.total / data.page_size);
    const startRecord = (current - 1) * data.page_size + 1;
    const endRecord = Math.min(current * data.page_size, data.total);
    const navEl = document.getElementById('pagination-nav');
    const recordEl = document.getElementById('record-info');

    // 记录统计
    recordEl.textContent = `显示第 ${startRecord}-${endRecord} 条记录，共 ${data.total} 条`;

    if (total <= 1) {
        navEl.innerHTML = '';
        return;
    }

    let html = '';

    // 上一页按钮
    html += `<button class="page-btn-prev" onclick="loadCases(${current - 1})" ${current === 1 ? 'disabled' : ''}>&lt; 上一页</button>`;

    // 当前页码
    html += `<span style="padding:0 8px;font-size:14px;color:#333;font-weight:500;">${current} / ${total}</span>`;

    // 下一页按钮
    html += `<button class="page-btn-next" onclick="loadCases(${current + 1})" ${current === total ? 'disabled' : ''}>下一页 &gt;</button>`;

    // 跳转到指定页
    html += `<span style="color:#999;margin:0 6px 0 10px;font-size:12px;">跳转到</span><input type="number" class="page-jump-input" id="page-jump-input" min="1" max="${total}" placeholder="页码"><button class="page-btn-jump" onclick="jumpToPage(${total})">确定</button>`;

    navEl.innerHTML = html;

    // 为输入框绑定回车键
    setTimeout(() => {
        const jumpInput = document.getElementById('page-jump-input');
        if (jumpInput) {
            jumpInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') jumpToPage(total);
            });
        }
    }, 0);
}

function changePerPage(value) {
    currentPageSize = parseInt(value);
    loadCases(1);
}

function jumpToPage(total) {
    const input = document.getElementById('page-jump-input');
    if (!input) return;
    let page = parseInt(input.value);
    if (isNaN(page) || page < 1) {
        alert('请输入有效的页码');
        return;
    }
    if (page > total) {
        alert('页码不能超过总页数 ' + total + ' 页');
        return;
    }
    loadCases(page);
}

// 筛选框change事件
document.getElementById('filter-status').addEventListener('change', function() {
    loadCases(1);
});
document.getElementById('filter-category').addEventListener('change', function() {
    loadCases(1);
});
document.getElementById('filter-score').addEventListener('change', function() {
    loadCases(1);
});

// 搜索框防抖
let _searchTimer = null;
document.getElementById('search-keyword').addEventListener('input', function() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => loadCases(1), 400);
});

loadSources();
loadCases(1);
</script>
{% endblock %}
