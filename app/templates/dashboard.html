{% extends "base.html" %}
{% block title %}统计看板 - 标注平台{% endblock %}
{% block content %}
<div class="filters">
    <button type="button" class="time-btn" data-range="custom">自定义时间</button>
    <span style="flex:1"></span>
    <button type="button" class="time-btn-refresh" id="btn-notify" title="通知设置">🔔 通知设置</button>
    <button type="button" class="time-btn-refresh" id="btn-refresh" title="刷新">刷新</button>
</div>

<div class="time-custom-range" id="time-custom-range">
    <input type="date" id="stats-start" class="date-input">
    <span class="date-sep">—</span>
    <input type="date" id="stats-end" class="date-input">
    <button type="button" class="btn-shortcut" id="btn-today" data-range="today">今天</button>
    <button type="button" class="btn-shortcut" id="btn-7days" data-range="7days">近7天</button>
    <button type="button" class="btn-shortcut" id="btn-30days" data-range="30days">近30天</button>
    <button type="button" class="btn-confirm" id="btn-confirm-date">确认</button>
    <button type="button" class="btn-cancel" id="btn-cancel-date">取消</button>
</div>

<div class="dashboard-overview" id="overview-cards"></div>

<div class="card">
    <h3>来源标注分布</h3>
    <div class="table-scroll-wrapper">
        <table class="data-table">
            <thead>
                <tr><th>来源</th><th>已标注</th><th>待标注</th><th>平均分</th></tr>
            </thead>
            <tbody id="category-table"></tbody>
        </table>
    </div>
</div>

<!-- 通知设置弹窗 -->
<div class="modal-overlay" id="notify-modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>通知设置</h3>
            <button type="button" class="modal-close" id="btn-close-notify">&times;</button>
        </div>
        <div class="modal-body">
            <div class="webhook-toolbar">
                <button type="button" class="btn-webhook-add" id="btn-add-webhook">+ 添加 Webhook</button>
            </div>
            <div class="webhook-form" id="webhook-form" style="display:none;">
                <div class="webhook-form-row">
                    <input type="text" id="webhook-name" class="webhook-input" placeholder="Webhook 名称">
                </div>
                <div class="webhook-form-row">
                    <input type="text" id="webhook-url" class="webhook-input" placeholder="企微 Webhook 地址">
                </div>
                <div class="webhook-form-row" style="justify-content:flex-end;">
                    <button type="button" class="btn-webhook-cancel" id="btn-cancel-webhook">取消</button>
                    <button type="button" class="btn-webhook-confirm" id="btn-confirm-webhook">添加</button>
                </div>
            </div>
            <div class="table-scroll-wrapper" style="max-height:300px;">
                <table class="data-table">
                    <thead>
                        <tr><th>名称</th><th>Webhook 地址</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody id="webhook-table"></tbody>
                </table>
            </div>
            <div class="webhook-empty" id="webhook-empty" style="display:none;">暂无 Webhook 配置，点击上方按钮添加</div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/v1';

// 时间筛选逻辑 - 仅自定义模式
let currentRange = '';

document.querySelectorAll('.time-btn[data-range]').forEach(btn => {
    btn.addEventListener('click', function() {
        const range = this.dataset.range;
        if (range === 'custom') {
            const customRange = document.getElementById('time-custom-range');
            if (customRange.style.display === 'none' || !customRange.style.display) {
                customRange.style.display = 'flex';
                currentRange = 'custom';
                this.classList.add('active');
            } else {
                customRange.style.display = 'none';
                currentRange = '';
                this.classList.remove('active');
            }
        }
    });
});

document.getElementById('btn-confirm-date').addEventListener('click', function() {
    currentRange = 'custom';
    document.querySelector('.time-btn[data-range="custom"]').classList.add('active');
    loadStats();
});

// 快捷时间按钮
function setShortcutDate(days) {
    const end = new Date();
    const start = new Date();
    if (days === 0) {
        start.setHours(0, 0, 0, 0);
    } else {
        start.setDate(start.getDate() - days);
    }
    // date input 只接受 YYYY-MM-DD 格式，使用本地时间避免时区偏移
    const fmtDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById('stats-start').value = fmtDate(start);
    document.getElementById('stats-end').value = fmtDate(end);
    document.getElementById('time-custom-range').style.display = 'flex';
    currentRange = 'custom';
    document.querySelector('.time-btn[data-range="custom"]').classList.add('active');
    document.querySelectorAll('.btn-shortcut').forEach(btn => btn.classList.remove('active'));
    const key = days === 0 ? 'btn-today' : days === 6 ? 'btn-7days' : 'btn-30days';
    document.getElementById(key).classList.add('active');
    loadStats();
}

document.getElementById('btn-today').addEventListener('click', function() { setShortcutDate(0); });
document.getElementById('btn-7days').addEventListener('click', function() { setShortcutDate(6); });
document.getElementById('btn-30days').addEventListener('click', function() { setShortcutDate(29); });

document.getElementById('btn-cancel-date').addEventListener('click', function() {
    document.getElementById('time-custom-range').style.display = 'none';
    document.getElementById('stats-start').value = '';
    document.getElementById('stats-end').value = '';
    document.querySelectorAll('.btn-shortcut').forEach(btn => btn.classList.remove('active'));
    currentRange = '';
    document.querySelector('.time-btn[data-range="custom"]').classList.remove('active');
    loadStats();
});

document.getElementById('btn-refresh').addEventListener('click', function() {
    window.location.reload();
});

function loadStats() {
    const params = new URLSearchParams();
    const start = document.getElementById('stats-start').value;
    const end = document.getElementById('stats-end').value;
    if (start) params.set('start_date', start.includes('T') ? start : start + 'T00:00:00');
    if (end) params.set('end_date', end.includes('T') ? end : end + 'T23:59:59');

    fetch(API + '/stats?' + params)
        .then(r => r.json())
        .then(data => {
            const ov = data.overview;
const avgOverall = data.averages && data.averages.overall ? data.averages.overall : 0;
            document.getElementById('overview-cards').innerHTML = `
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">总 Case 数</div>
                    <div class="dashboard-stat-value">${ov.total_cases}</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">已标注</div>
                    <div class="dashboard-stat-value">${ov.annotated_cases}</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">待标注</div>
                    <div class="dashboard-stat-value">${ov.pending_cases}</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">标注完成率</div>
<div class="dashboard-stat-value">${(ov.annotation_rate * 100).toFixed(0)}%</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">整体平均分</div>
                    <div class="dashboard-stat-value">${avgOverall.toFixed(2)}</div>
                </div>
            `;

            document.getElementById('category-table').innerHTML = data.category_distribution.map(c => `
                <tr>
                    <td class="truncate">${c.category}</td>
                    <td>${c.annotated}</td>
                    <td>${c.pending}</td>
                    <td>${c.avg_overall}</td>
                </tr>
            `).join('');
        });
}

loadStats();

// ============ Webhook 管理 ============
function loadWebhooks() {
    fetch(API + '/webhooks')
        .then(r => r.json())
        .then(data => {
            const tbody = document.getElementById('webhook-table');
            const empty = document.getElementById('webhook-empty');
            if (!data.webhooks || data.webhooks.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            tbody.innerHTML = data.webhooks.map(w => `
                <tr>
                    <td>${w.name}</td>
                    <td title="${w.url}">${w.url}</td>
                    <td>
                        <label class="webhook-switch">
                            <input type="checkbox" ${w.enabled ? 'checked' : ''} onchange="toggleWebhook(${w.id}, this.checked)">
                            <span class="switch-slider"></span>
                        </label>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-sm btn-webhook-test" onclick="testWebhook(${w.id}, '${w.url}')">测试</button>
                            <button class="btn btn-sm btn-delete" onclick="deleteWebhook(${w.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        });
}

function toggleWebhook(id, enabled) {
    fetch(API + '/webhooks/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enabled: enabled})
    }).then(r => r.json());
}

function deleteWebhook(id) {
    if (!confirm('确定删除该 Webhook？')) return;
    fetch(API + '/webhooks/' + id, {method: 'DELETE'})
        .then(r => r.json())
        .then(() => loadWebhooks());
}

function testWebhook(id, url) {
    const btn = event.target;
    btn.textContent = '发送中...';
    btn.disabled = true;
    fetch(API + '/webhooks/test', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url: url})
    })
    .then(r => r.json())
    .then(data => {
        alert(data.success ? '✅ 测试消息发送成功' : '❌ ' + data.message);
    })
    .catch(() => alert('❌ 请求失败'))
    .finally(() => {
        btn.textContent = '测试';
        btn.disabled = false;
    });
}

document.getElementById('btn-add-webhook').addEventListener('click', function() {
    document.getElementById('webhook-form').style.display = 'block';
    document.getElementById('webhook-name').value = '';
    document.getElementById('webhook-url').value = '';
    document.getElementById('webhook-name').focus();
});

document.getElementById('btn-cancel-webhook').addEventListener('click', function() {
    document.getElementById('webhook-form').style.display = 'none';
});

document.getElementById('btn-confirm-webhook').addEventListener('click', function() {
    const name = document.getElementById('webhook-name').value.trim();
    const url = document.getElementById('webhook-url').value.trim();
    if (!name) { alert('请输入 Webhook 名称'); return; }
    if (!url) { alert('请输入企微 Webhook 地址'); return; }
    fetch(API + '/webhooks', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, url})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert('❌ ' + data.error); return; }
        document.getElementById('webhook-form').style.display = 'none';
        loadWebhooks();
    });
});

// 通知设置弹窗
document.getElementById('btn-notify').addEventListener('click', function() {
    document.getElementById('notify-modal').classList.add('active');
    loadWebhooks();
});
document.getElementById('btn-close-notify').addEventListener('click', function() {
    document.getElementById('notify-modal').classList.remove('active');
});
document.getElementById('notify-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
});
</script>
{% endblock %}
