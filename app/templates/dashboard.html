{% extends "base.html" %}
{% block title %}统计看板 - 标注平台{% endblock %}
{% block content %}
<h2>数据统计看板</h2>

<div class="filters">
    <button type="button" class="time-btn" data-range="custom">自定义时间</button>
    <button type="button" class="time-btn-refresh" id="btn-refresh" title="刷新">刷新</button>
</div>

<div class="time-custom-range" id="time-custom-range">
    <input type="date" id="stats-start" class="date-input">
    <span class="date-sep">—</span>
    <input type="date" id="stats-end" class="date-input">
    <button type="button" class="btn-shortcut" id="btn-today" data-range="today">今天</button>
    <button type="button" class="btn-shortcut" id="btn-7days" data-range="7days">近7天</button>
    <button type="button" class="btn-shortcut" id="btn-30days" data-range="30days">近30天</button>
    <button type="button" class="btn-confirm" id="btn-confirm-date">确认</button>
    <button type="button" class="btn-cancel" id="btn-cancel-date">取消</button>
</div>

<div class="dashboard-overview" id="overview-cards"></div>

<div class="card">
    <h3>分类标注分布</h3>
    <table class="data-table">
        <thead>
            <tr><th>分类</th><th>已标注</th><th>待标注</th><th>平均分</th></tr>
        </thead>
        <tbody id="category-table"></tbody>
    </table>
</div>

<div class="card">
    <h3>低分 Case 列表</h3>
    <div class="filter-row">
        <label>阈值：</label>
        <select id="low-threshold" onchange="loadStats()">
            <option value="0">0</option>
            <option value="0.33">0.33</option>
            <option value="0.67">0.67</option>
            <option value="1" selected>1.00</option>
            <option value="1.33">1.33</option>
            <option value="1.67">1.67</option>
            <option value="2">2.00</option>
        </select>
    </div>
    <table class="data-table">
        <thead>
            <tr><th>Case ID</th><th>分类</th><th>整体分数</th><th>根因</th><th>操作</th></tr>
        </thead>
        <tbody id="low-score-table"></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/v1';

// 时间筛选逻辑 - 仅自定义模式
let currentRange = '';

document.querySelectorAll('.time-btn[data-range]').forEach(btn => {
    btn.addEventListener('click', function() {
        const range = this.dataset.range;
        if (range === 'custom') {
            const customRange = document.getElementById('time-custom-range');
            if (customRange.style.display === 'none' || !customRange.style.display) {
                customRange.style.display = 'flex';
                currentRange = 'custom';
                this.classList.add('active');
            } else {
                customRange.style.display = 'none';
                currentRange = '';
                this.classList.remove('active');
            }
        }
    });
});

document.getElementById('btn-confirm-date').addEventListener('click', function() {
    currentRange = 'custom';
    document.querySelector('.time-btn[data-range="custom"]').classList.add('active');
    loadStats();
});

// 快捷时间按钮
function setShortcutDate(days) {
    const end = new Date();
    const start = new Date();
    if (days === 0) {
        start.setHours(0, 0, 0, 0);
    } else {
        start.setDate(start.getDate() - days);
    }
    const fmt = d => d.toISOString().split('T')[0];
    document.getElementById('stats-start').value = fmt(start);
    document.getElementById('stats-end').value = fmt(end);
    document.getElementById('time-custom-range').style.display = 'flex';
    currentRange = 'custom';
    document.querySelector('.time-btn[data-range="custom"]').classList.add('active');
    document.querySelectorAll('.btn-shortcut').forEach(btn => btn.classList.remove('active'));
    const key = days === 0 ? 'btn-today' : days === 6 ? 'btn-7days' : 'btn-30days';
    document.getElementById(key).classList.add('active');
    loadStats();
}

document.getElementById('btn-today').addEventListener('click', function() { setShortcutDate(0); });
document.getElementById('btn-7days').addEventListener('click', function() { setShortcutDate(6); });
document.getElementById('btn-30days').addEventListener('click', function() { setShortcutDate(29); });

document.getElementById('btn-cancel-date').addEventListener('click', function() {
    document.getElementById('time-custom-range').style.display = 'none';
    document.getElementById('stats-start').value = '';
    document.getElementById('stats-end').value = '';
    document.querySelectorAll('.btn-shortcut').forEach(btn => btn.classList.remove('active'));
    currentRange = '';
    document.querySelector('.time-btn[data-range="custom"]').classList.remove('active');
    loadStats();
});

document.getElementById('btn-refresh').addEventListener('click', function() {
    window.location.reload();
});

function loadStats() {
    const params = new URLSearchParams();
    const start = document.getElementById('stats-start').value;
    const end = document.getElementById('stats-end').value;
    const threshold = document.getElementById('low-threshold').value;
    if (start) params.set('start_date', start);
    if (end) params.set('end_date', end);
    params.set('low_score_threshold', threshold);

    fetch(API + '/stats?' + params)
        .then(r => r.json())
        .then(data => {
            const ov = data.overview;
const avgOverall = data.averages && data.averages.overall ? data.averages.overall : 0;
            document.getElementById('overview-cards').innerHTML = `
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">总 Case 数</div>
                    <div class="dashboard-stat-value">${ov.total_cases}</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">已标注</div>
                    <div class="dashboard-stat-value">${ov.annotated_cases}</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">待标注</div>
                    <div class="dashboard-stat-value">${ov.pending_cases}</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">标注完成率</div>
                    <div class="dashboard-stat-value">${(ov.annotation_rate * 100).toFixed(0)}%</div>
                </div>
                <div class="dashboard-stat">
                    <div class="dashboard-stat-label">整体平均分</div>
                    <div class="dashboard-stat-value">${avgOverall.toFixed(2)}</div>
                </div>
            `;

            document.getElementById('category-table').innerHTML = data.category_distribution.map(c => `
                <tr>
                    <td class="truncate">${c.category}</td>
                    <td>${c.annotated}</td>
                    <td>${c.pending}</td>
                    <td>${c.avg_overall}</td>
                </tr>
            `).join('');

            document.getElementById('low-score-table').innerHTML = data.low_score_cases.map(c => `
                <tr>
                    <td>${c.case_id}</td>
                    <td class="truncate">${c.category || '-'}</td>
                    <td>${c.overall_score}</td>
                    <td class="truncate" title="${c.root_cause || ''}">${c.root_cause || '-'}</td>
                    <td><a href="/annotate/${c.case_id}" class="btn btn-sm">查看</a></td>
                </tr>
            `).join('');
        });
}

loadStats();
</script>
{% endblock %}
